<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Compte à rebours élégant jusqu'au 25.04.2026 à 17h, heure de Paris, avec étoiles filantes dorées plus spectaculaires en alternance." />
  <title>Compte à rebours - Variante intense</title>
  <style>

    :root {
      --bg: #0b3f31;
      --text: #ffffff;
      --gold: #d7b56d;
      --gold-soft: rgba(215, 181, 109, 0.22);
      --gold-faint: rgba(215, 181, 109, 0.08);
      --gold-bright: rgba(248, 230, 190, 0.98);
      --white-soft: rgba(255, 255, 255, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      position: relative;
      isolation: isolate;
    }

    .sky {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .shooting-star {
      --top: 10%;
      --left: -16%;
      --length: min(180px, 24vw);
      --travel-x: 72vw;
      --travel-y: 24vh;
      --angle: 16deg;
      --delay: 0s;
      --duration: 16s;
      --scale-start: 0.34;
      --scale-mid: 0.74;
      --scale-end: 1.02;
      --peak-opacity: 0.92;
      --thickness: 2px;
      position: absolute;
      top: var(--top);
      left: var(--left);
      width: var(--length);
      height: var(--thickness);
      border-radius: 999px;
      opacity: 0;
      transform-origin: left center;
      transform: translate3d(0, 0, 0) rotate(var(--angle)) scaleX(var(--scale-start));
      background: linear-gradient(
        90deg,
        rgba(215, 181, 109, 0) 0%,
        rgba(215, 181, 109, 0.08) 12%,
        rgba(215, 181, 109, 0.3) 34%,
        rgba(215, 181, 109, 0.76) 62%,
        rgba(248, 230, 190, 0.96) 86%,
        rgba(255, 255, 255, 0.98) 100%
      );
      filter: drop-shadow(0 0 8px rgba(215, 181, 109, 0.34)) drop-shadow(0 0 18px rgba(215, 181, 109, 0.14));
      animation: shooting-star var(--duration) linear infinite;
      animation-delay: var(--delay);
      will-change: transform, opacity;
    }

    .shooting-star::before,
    .shooting-star::after {
      content: "";
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 999px;
    }

    .shooting-star::before {
      width: 10px;
      height: 10px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.98) 0%, rgba(248, 230, 190, 0.92) 32%, rgba(215, 181, 109, 0.18) 70%, rgba(215, 181, 109, 0) 100%);
      box-shadow: 0 0 14px rgba(248, 230, 190, 0.28);
    }

    .shooting-star::after {
      width: 18px;
      height: 1px;
      background: linear-gradient(90deg, rgba(215, 181, 109, 0), rgba(248, 230, 190, 0.95), rgba(215, 181, 109, 0));
      transform: translateY(-50%) rotate(90deg);
      opacity: 0.8;
    }

    main {
      width: min(94vw, 1080px);
      padding: clamp(28px, 5vw, 60px);
      text-align: center;
      position: relative;
      z-index: 1;
      isolation: isolate;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .ornament {
      width: min(280px, 52vw);
      height: 22px;
      margin: 0 auto 28px;
      position: relative;
      opacity: 0;
      transform: translateY(10px);
      animation: fade-up 1s 0.15s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .ornament::before,
    .ornament::after {
      content: "";
      position: absolute;
      top: 50%;
      width: calc(50% - 14px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.9;
    }

    .ornament::before {
      left: 0;
      transform-origin: right center;
      animation: line-grow-left 1.2s 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    .ornament::after {
      right: 0;
      transform-origin: left center;
      animation: line-grow-right 1.2s 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    .ornament span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--gold);
      transform: translate(-50%, -50%) scale(0.2);
      box-shadow: 0 0 0 0 var(--gold-soft);
      animation:
        dot-in 0.9s 0.55s cubic-bezier(0.19, 1, 0.22, 1) forwards,
        dot-glow 3.8s 2.1s ease-in-out infinite;
    }

    .eyebrow {
      margin: 0 0 22px;
      color: var(--gold);
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      animation: fade-up 1s 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .timer-shell {
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .timer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(18px, 3.4vw, 34px);
      align-items: flex-start;
      animation: timer-breathe 5.2s 2.5s ease-in-out infinite;
      will-change: transform;
    }

    .time-group {
      position: relative;
      min-width: clamp(92px, 18vw, 158px);
      padding-inline: clamp(4px, 1vw, 8px);
      opacity: 0;
      transform: translateY(14px) scale(0.985);
      animation: fade-up 1s var(--delay) cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .time-group:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 16%;
      right: calc(clamp(18px, 3.4vw, 34px) / -2);
      width: 1px;
      height: 68%;
      background: linear-gradient(180deg, transparent, rgba(215, 181, 109, 0.45), transparent);
      opacity: 0.9;
    }

    .digits {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums lining-nums;
      color: var(--text);
      text-shadow: 0 0 0 transparent;
      transition: text-shadow 260ms ease, transform 260ms ease, opacity 220ms ease;
      min-width: 2.3ch;
      display: inline-block;
    }

    .digits.tick {
      animation: digit-tick 560ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .label {
      margin-top: 12px;
      color: var(--white-soft);
      font-size: clamp(0.76rem, 1.7vw, 0.96rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .finale {
      margin: 10px 0 0;
      min-height: 1.4em;
      color: var(--gold);
      font-size: clamp(1rem, 2.3vw, 1.2rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 500ms ease, transform 500ms ease;
    }

    .finale.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .accent-line {
      width: min(240px, 42vw);
      height: 1px;
      margin: 28px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transform: scaleX(0.2);
      transform-origin: center;
      animation:
        line-in 1.1s 1.1s cubic-bezier(0.19, 1, 0.22, 1) forwards,
        line-shimmer 4.6s 2.5s ease-in-out infinite;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes line-grow-left {
      from {
        transform: scaleX(0);
      }
      to {
        transform: scaleX(1);
      }
    }

    @keyframes line-grow-right {
      from {
        transform: scaleX(0);
      }
      to {
        transform: scaleX(1);
      }
    }

    @keyframes dot-in {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes dot-glow {
      0%,
      100% {
        box-shadow: 0 0 0 0 var(--gold-soft);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(215, 181, 109, 0);
      }
    }

    @keyframes digit-tick {
      0% {
        opacity: 0.72;
        transform: translateY(6px) scale(0.985);
        text-shadow: 0 0 0 transparent;
      }
      45% {
        opacity: 1;
        transform: translateY(-1px) scale(1.012);
        text-shadow: 0 0 18px rgba(255, 255, 255, 0.06), 0 0 24px rgba(215, 181, 109, 0.12);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        text-shadow: 0 0 0 transparent;
      }
    }

    @keyframes timer-breathe {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-1px) scale(1.004);
      }
    }

    @keyframes line-in {
      from {
        opacity: 0;
        transform: scaleX(0.2);
      }
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes line-shimmer {
      0%,
      100% {
        opacity: 0.88;
        filter: brightness(1);
      }
      50% {
        opacity: 1;
        filter: brightness(1.12);
      }
    }

    @keyframes shooting-star {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(var(--angle)) scaleX(var(--scale-start));
      }
      5% {
        opacity: 0;
      }
      10% {
        opacity: var(--peak-opacity);
        transform: translate3d(calc(var(--travel-x) * 0.16), calc(var(--travel-y) * 0.16), 0) rotate(var(--angle)) scaleX(var(--scale-mid));
      }
      21% {
        opacity: 1;
        transform: translate3d(calc(var(--travel-x) * 0.62), calc(var(--travel-y) * 0.62), 0) rotate(var(--angle)) scaleX(var(--scale-end));
      }
      29% {
        opacity: 0;
        transform: translate3d(var(--travel-x), var(--travel-y), 0) rotate(var(--angle)) scaleX(var(--scale-end));
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--travel-x), var(--travel-y), 0) rotate(var(--angle)) scaleX(var(--scale-end));
      }
    }

    @keyframes twinkle {
      0%,
      100% {
        opacity: 0.14;
        transform: scale(0.8);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.15);
      }
    }

    @media (max-width: 760px) {
      .timer {
        gap: 22px 16px;
      }

      .time-group {
        min-width: 40%;
      }

      .time-group:nth-child(2)::after {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .time-group {
        min-width: 44%;
      }

      .label {
        letter-spacing: 0.18em;
      }

      .shooting-star {
        height: max(1.4px, var(--thickness));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .ornament,
      .eyebrow,
      .time-group,
      .accent-line,
      .finale {
        opacity: 1 !important;
        transform: none !important;
        filter: none !important;
      }

      .sky {
        display: none;
      }
    }

    .sky::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(215, 181, 109, 0.06), transparent 18%),
        radial-gradient(circle at 84% 24%, rgba(215, 181, 109, 0.04), transparent 18%),
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.025), transparent 22%);
    }

    .shooting-star {
      --peak-opacity: 0.98;
      --thickness: 2px;
      filter: drop-shadow(0 0 10px rgba(215, 181, 109, 0.4)) drop-shadow(0 0 22px rgba(215, 181, 109, 0.18));
    }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(248, 230, 190, 0.9);
      box-shadow: 0 0 12px rgba(248, 230, 190, 0.26), 0 0 22px rgba(215, 181, 109, 0.1);
      opacity: 0.18;
      animation: twinkle 4.8s ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .spark::before,
    .spark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: rgba(248, 230, 190, 0.75);
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    .spark::before {
      width: 12px;
      height: 1px;
    }

    .spark::after {
      width: 1px;
      height: 12px;
    }

    .star-1 {
      --top: 12%;
      --left: -16%;
      --length: min(180px, 25vw);
      --travel-x: 76vw;
      --travel-y: 22vh;
      --angle: 15deg;
      --delay: 0s;
      --duration: 12s;
    }

    .star-2 {
      --top: 26%;
      --left: 108%;
      --length: min(164px, 22vw);
      --travel-x: -68vw;
      --travel-y: 18vh;
      --angle: -14deg;
      --delay: 2s;
      --duration: 12s;
      --scale-start: -0.34;
      --scale-mid: -0.76;
      --scale-end: -1.03;
    }

    .star-3 {
      --top: 8%;
      --left: 10%;
      --length: min(190px, 26vw);
      --travel-x: 72vw;
      --travel-y: 26vh;
      --angle: 17deg;
      --delay: 4s;
      --duration: 12s;
    }

    .star-4 {
      --top: 38%;
      --left: 106%;
      --length: min(152px, 21vw);
      --travel-x: -62vw;
      --travel-y: 16vh;
      --angle: -11deg;
      --delay: 6s;
      --duration: 12s;
      --scale-start: -0.32;
      --scale-mid: -0.72;
      --scale-end: -1.01;
    }

    .star-5 {
      --top: 18%;
      --left: -12%;
      --length: min(148px, 20vw);
      --travel-x: 64vw;
      --travel-y: 20vh;
      --angle: 13deg;
      --delay: 8s;
      --duration: 12s;
    }

    .star-6 {
      --top: 6%;
      --left: 102%;
      --length: min(138px, 18vw);
      --travel-x: -56vw;
      --travel-y: 22vh;
      --angle: -18deg;
      --delay: 10s;
      --duration: 12s;
      --scale-start: -0.3;
      --scale-mid: -0.7;
      --scale-end: -1;
    }

    .spark-1 { top: 16%; left: 14%; --delay: 0.2s; }
    .spark-2 { top: 22%; left: 76%; --delay: 1.4s; }
    .spark-3 { top: 10%; left: 46%; --delay: 2.1s; }
    .spark-4 { top: 34%; left: 22%; --delay: 2.8s; }
    .spark-5 { top: 28%; left: 62%; --delay: 3.6s; }
    .spark-6 { top: 18%; left: 88%; --delay: 4.4s; }
    .spark-7 { top: 12%; left: 30%; --delay: 1s; }
    .spark-8 { top: 40%; left: 72%; --delay: 5.2s; }
    .spark-9 { top: 8%; left: 66%; --delay: 0.8s; }
    .spark-10 { top: 30%; left: 8%; --delay: 4.9s; }

    @media (max-width: 760px) {
      .star-1 { --travel-x: 84vw; --travel-y: 20vh; }
      .star-2 { --travel-x: -80vw; --travel-y: 16vh; }
      .star-3 { --travel-x: 86vw; --travel-y: 22vh; }
      .star-4 { --travel-x: -74vw; --travel-y: 14vh; }
      .star-5 { --travel-x: 78vw; --travel-y: 18vh; }
      .star-6 { --travel-x: -68vw; --travel-y: 18vh; }
      .spark-8,
      .spark-10 {
        display: none;
      }
    }

  </style>
</head>
<body>
  <div class="sky" aria-hidden="true">
    <span class="spark spark-1"></span>
    <span class="spark spark-2"></span>
    <span class="spark spark-3"></span>
    <span class="spark spark-4"></span>
    <span class="spark spark-5"></span>
    <span class="spark spark-6"></span>
    <span class="spark spark-7"></span>
    <span class="spark spark-8"></span>
    <span class="spark spark-9"></span>
    <span class="spark spark-10"></span>
    <span class="shooting-star star-1"></span>
    <span class="shooting-star star-2"></span>
    <span class="shooting-star star-3"></span>
    <span class="shooting-star star-4"></span>
    <span class="shooting-star star-5"></span>
    <span class="shooting-star star-6"></span>
  </div>

  <main>
    <div class="ornament" aria-hidden="true"><span></span></div>
    <p class="eyebrow">Compte à rebours</p>

    <section class="timer-shell" aria-labelledby="countdown-title">
      <h1 id="countdown-title" class="sr-only">Compte à rebours jusqu'au 25 avril 2026 à 17 heures, heure de Paris</h1>

      <div class="timer" aria-hidden="true">
        <div class="time-group" style="--delay: 0.35s">
          <div class="digits" id="days">00</div>
          <div class="label">Jours</div>
        </div>
        <div class="time-group" style="--delay: 0.5s">
          <div class="digits" id="hours">00</div>
          <div class="label">Heures</div>
        </div>
        <div class="time-group" style="--delay: 0.65s">
          <div class="digits" id="minutes">00</div>
          <div class="label">Minutes</div>
        </div>
        <div class="time-group" style="--delay: 0.8s">
          <div class="digits" id="seconds">00</div>
          <div class="label">Secondes</div>
        </div>
      </div>

      <p class="finale" id="finale" aria-hidden="true"></p>
      <p class="sr-only" id="live-status" aria-live="polite" aria-atomic="true">Chargement du compte à rebours.</p>
    </section>

    <div class="accent-line" aria-hidden="true"></div>
  </main>

  <script>
    (function () {
      var targetTimestamp = Date.UTC(2026, 3, 25, 15, 0, 0);
      var els = {
        days: document.getElementById('days'),
        hours: document.getElementById('hours'),
        minutes: document.getElementById('minutes'),
        seconds: document.getElementById('seconds')
      };

      var liveStatus = document.getElementById('live-status');
      var finale = document.getElementById('finale');
      var previous = { days: null, hours: null, minutes: null, seconds: null };
      var lastAnnouncedMinute = null;

      function pad(value) {
        return String(value).padStart(2, '0');
      }

      function animateChange(el) {
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
      }

      function setValue(key, value) {
        var formatted = pad(value);
        if (previous[key] !== formatted) {
          els[key].textContent = formatted;
          animateChange(els[key]);
          previous[key] = formatted;
        }
      }

      function announce(days, hours, minutes, seconds) {
        if (days === 0 && hours === 0 && minutes === 0 && seconds === 0) {
          liveStatus.textContent = 'Le moment est arrivé.';
          return;
        }

        if (minutes !== lastAnnouncedMinute) {
          liveStatus.textContent = days + ' jours, ' + hours + ' heures, ' + minutes + ' minutes et ' + seconds + ' secondes restantes.';
          lastAnnouncedMinute = minutes;
        }
      }

      function updateCountdown() {
        var now = Date.now();
        var diff = Math.max(0, targetTimestamp - now);

        var days = Math.floor(diff / 86400000);
        diff -= days * 86400000;

        var hours = Math.floor(diff / 3600000);
        diff -= hours * 3600000;

        var minutes = Math.floor(diff / 60000);
        diff -= minutes * 60000;

        var seconds = Math.floor(diff / 1000);

        setValue('days', days);
        setValue('hours', hours);
        setValue('minutes', minutes);
        setValue('seconds', seconds);
        announce(days, hours, minutes, seconds);

        if (targetTimestamp <= now) {
          finale.textContent = 'Le moment est arrivé';
          finale.classList.add('is-visible');
          document.title = 'Le moment est arrivé';
          clearInterval(intervalId);
          return;
        }

        document.title = pad(days) + 'j ' + pad(hours) + 'h ' + pad(minutes) + 'm ' + pad(seconds) + 's';
      }

      updateCountdown();
      var intervalId = setInterval(updateCountdown, 1000);
    })();
  </script>
</body>
</html>
